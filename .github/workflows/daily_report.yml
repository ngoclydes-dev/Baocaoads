name: Meta Ads Daily Report

on:
  schedule:
  - cron: '37 2 * * *'   # 9:37 sáng giờ VN (UTC+7)
  workflow_dispatch:
    inputs:
      period:
        description: 'Period to report'
        required: false
        default: 'daily'

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          AD_ACCOUNT_1: ${{ secrets.AD_ACCOUNT_1 }}
          AD_ACCOUNT_2: ${{ secrets.AD_ACCOUNT_2 }}
          AD_ACCOUNT_3: ${{ secrets.AD_ACCOUNT_3 }}
          AD_ACCOUNT_4: ${{ secrets.AD_ACCOUNT_4 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPORT_TIME: "07:30"
          PERIOD: ${{ github.event.inputs.period || 'daily' }}
        run: python meta_ads_bot.py

        

