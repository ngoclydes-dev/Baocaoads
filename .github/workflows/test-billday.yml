name: Test Bill Day Alert

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run test
        env:
          BILL_DAY_1: ${{ secrets.BILL_DAY_1 }}
          BILL_DAY_2: ${{ secrets.BILL_DAY_2 }}
          BILL_DAY_3: ${{ secrets.BILL_DAY_3 }}
          BILL_DAY_4: ${{ secrets.BILL_DAY_4 }}
        run: python test_billday.py
