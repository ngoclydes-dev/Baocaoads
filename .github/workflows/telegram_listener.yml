name: Telegram Command Listener

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  listen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run listener
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          PANCAKE_TOKEN: ${{ secrets.PANCAKE_TOKEN }}
          AD_ACCOUNT_1: ${{ secrets.AD_ACCOUNT_1 }}
          AD_ACCOUNT_2: ${{ secrets.AD_ACCOUNT_2 }}
          AD_ACCOUNT_3: ${{ secrets.AD_ACCOUNT_3 }}
          AD_ACCOUNT_4: ${{ secrets.AD_ACCOUNT_4 }}
          BILL_DAY_1: ${{ secrets.BILL_DAY_1 }}
          BILL_DAY_2: ${{ secrets.BILL_DAY_2 }}
          BILL_DAY_3: ${{ secrets.BILL_DAY_3 }}
          BILL_DAY_4: ${{ secrets.BILL_DAY_4 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_listener.py

      - name: Lưu lại offset (nếu có thay đổi)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add telegram_offset.txt
          git diff --staged --quiet || git commit -m "Update telegram offset [skip ci]"
          git push
